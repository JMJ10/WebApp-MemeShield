<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemeShield — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-auth">

  <div class="noise-overlay"></div>

  <div class="auth-wrapper">
    <a href="/index.html" class="back-link">← Back</a>

    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon-lg">🛡</span>
      </div>
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Enter your username to continue to MemeShield</p>

      <div class="input-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="e.g. alex_m" maxlength="20" autocomplete="off" />
      </div>

      <button id="join-btn" class="btn-primary-full" onclick="login()">
        Continue
        <span class="btn-arrow">→</span>
      </button>

      <p class="auth-note">No account needed — just pick a name and start.</p>
    </div>
  </div>

  <script>
    const input = document.getElementById('username');
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    input.focus();

    function login() {
      const name = input.value.trim();
      if (!name) {
        input.classList.add('input-error');
        input.placeholder = 'Please enter a username';
        setTimeout(() => input.classList.remove('input-error'), 600);
        return;
      }
      localStorage.setItem('username', name);
      window.location.href = '/home.html';
    }
  </script>
</body>
</html>
