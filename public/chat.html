<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemeShield Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="page-chat">

  <div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="chat-header-left">
        <a href="/home.html" class="chat-back">←</a>
        <div class="chat-title-wrap">
          <span class="chat-logo-icon">🛡</span>
          <h1 class="chat-title">MemeShield Chat</h1>
        </div>
      </div>
      <div class="chat-header-right">
        <span id="connection-status" class="status-pill offline">● Offline</span>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-message">
        <div class="welcome-content">
          <span class="welcome-icon">💬</span>
          <h2>Welcome to MemeShield Chat</h2>
          <p>Send messages, share emojis, or upload a meme — AI moderation runs on every image.</p>
        </div>
      </div>
    </div>

    <!-- TYPING INDICATOR -->
    <div class="typing-indicator hidden" id="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span id="typing-text">Someone is typing…</span>
    </div>

    <!-- INPUT AREA -->
    <div class="chat-input-area">
      <div class="input-row">
        <div class="input-actions">
          <button class="action-btn" id="emoji-btn" title="Emoji">😊</button>
          <button class="action-btn" id="image-btn" title="Share Meme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21,15 16,10 5,21"/>
            </svg>
          </button>
        </div>
        <div class="input-field-wrap">
          <input type="text" id="message-input" placeholder="Type a message…" maxlength="500">
          <button class="send-btn" id="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- EMOJI PICKER -->
    <div class="emoji-picker hidden" id="emoji-picker">
      <div class="emoji-picker-header">
        <span>Emojis</span>
        <button class="emoji-close" id="close-emoji">✕</button>
      </div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="image-input" accept="image/*" hidden>
  </div>

  <script src="chat.js"></script>
</body>
</html>
