<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemeShield — Analyze Meme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-upload">

  <div class="noise-overlay"></div>

  <nav class="nav">
    <div class="nav-logo">
      <a href="/home.html" class="nav-back">←</a>
      <span class="logo-icon">🛡</span>
      <span class="logo-text">MemeShield</span>
    </div>
    <span class="nav-user" id="nav-username"></span>
  </nav>

  <main class="upload-main">
    <div class="upload-panel">
      <div class="upload-header">
        <h2>Analyze Meme</h2>
        <p>Upload an image to get an AI-powered offensiveness analysis</p>
      </div>

      <!-- Drop Zone -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" hidden>
        <div class="dz-idle" id="dz-idle">
          <span class="dz-icon">🖼</span>
          <p class="dz-main">Drop your meme here</p>
          <p class="dz-sub">or <button class="dz-browse" onclick="document.getElementById('file-input').click()">browse files</button></p>
          <p class="dz-formats">JPEG · PNG · GIF · WEBP · Max 5MB</p>
        </div>
        <div class="dz-preview hidden" id="dz-preview">
          <img id="preview-img" src="" alt="Preview">
          <button class="dz-clear" onclick="clearImage()">✕ Remove</button>
        </div>
      </div>

      <button class="btn-analyze" id="analyze-btn" onclick="analyze()" disabled>
        <span id="btn-text">Analyze Meme</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
    </div>

    <!-- Result Panel -->
    <div class="result-panel hidden" id="result-panel">
      <div class="result-header">
        <h3>Analysis Result</h3>
        <button class="result-close" onclick="clearResult()">✕</button>
      </div>

      <div class="result-image-wrap">
        <img id="result-img" src="" alt="">
      </div>

      <div class="result-verdict" id="result-verdict">
        <!-- Populated by JS -->
      </div>

      <div class="result-details" id="result-details">
        <!-- Populated by JS -->
      </div>

      <button class="btn-analyze-another" onclick="clearResult()">Analyze Another →</button>
    </div>
  </main>

  <script src="upload.js"></script>
  <script>
    const username = localStorage.getItem('username');
    if (!username) window.location.href = '/login.html';
    document.getElementById('nav-username').textContent = username || '';
  </script>
</body>
</html>
